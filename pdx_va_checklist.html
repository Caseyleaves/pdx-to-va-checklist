<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>PDX To VA Moving Checklist</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --radius: 12px;
    --done-bg: #f0fdf4;
    --done-text: #15803d;
    --accent: #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: #1a1a2e; color: #fff; padding: 20px 16px 14px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; flex-shrink: 0; margin-top: 6px; transition: background .3s; }
  .sync-dot.live { background: #4ade80; }
  .sync-dot.syncing { background: #fbbf24; }
  .sync-label { font-size: 10px; color: rgba(255,255,255,0.45); text-align: right; margin-top: 2px; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.15); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4ade80; border-radius: 99px; transition: width .4s ease; }
  .progress-label { font-size: 12px; color: rgba(255,255,255,0.7); white-space: nowrap; }

  .sync-banner { background: #fef3c7; border-bottom: 1px solid #fde68a; padding: 8px 16px; font-size: 12px; color: #92400e; display: none; align-items: center; gap: 6px; }
  .sync-banner.show { display: flex; }

  .controls { padding: 12px 16px 8px; display: flex; flex-direction: column; gap: 8px; }
  .search-row { display: flex; gap: 8px; }
  .search-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--card); color: var(--text); outline: none; }
  .search-input:focus { border-color: #6366f1; }
  .clear-btn { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--card); color: var(--muted); font-size: 13px; cursor: pointer; white-space: nowrap; }

  .filter-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; -ms-overflow-style: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .chip { padding: 6px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .15s; }
  .chip.active { border-color: #1a1a2e; background: #1a1a2e; color: #fff; }

  .summary-bar { display: flex; gap: 6px; padding: 0 16px 8px; flex-wrap: wrap; }
  .stat { font-size: 11px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; }
  .stat strong { color: var(--text); }

  .timeline { padding: 0 16px 100px; }

  .date-block { margin-bottom: 4px; }
  .date-hdr { display: flex; align-items: center; gap: 8px; padding: 14px 0 6px; }
  .date-label { font-size: 13px; font-weight: 700; color: var(--text); }
  .date-line { flex: 1; height: 1px; background: var(--border); }
  .date-count { font-size: 11px; color: var(--muted); background: var(--border); border-radius: 99px; padding: 2px 8px; }

  .task-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); border-left: 4px solid; margin-bottom: 8px; overflow: hidden; transition: opacity .2s; }
  .task-card.done { opacity: 0.52; background: var(--done-bg); }
  .task-card.deadline-card { box-shadow: 0 0 0 1px rgba(220,38,38,0.12); }

  .task-top { display: flex; align-items: flex-start; gap: 12px; padding: 13px 13px 10px; cursor: pointer; user-select: none; }
  .checkbox { width: 26px; height: 26px; min-width: 26px; border-radius: 8px; border: 2px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all .15s; cursor: pointer; }
  .checkbox.checked { background: #22c55e; border-color: #22c55e; }
  .checkbox.pending { background: #fbbf24; border-color: #fbbf24; }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }
  .task-meta { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--muted); }
  .task-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
  .deadline-pill { background: #fef2f2; color: #dc2626; }
  .chevron-btn { color: var(--muted); font-size: 20px; margin-top: 2px; transition: transform .2s; flex-shrink: 0; line-height: 1; }
  .chevron-btn.open { transform: rotate(180deg); }

  .task-body { padding: 0 13px; max-height: 0; overflow: hidden; transition: max-height .25s ease, padding .25s; }
  .task-body.open { max-height: 700px; padding-bottom: 12px; }
  .task-lines { display: flex; flex-direction: column; gap: 5px; border-top: 1px solid var(--border); padding-top: 10px; }
  .task-line { font-size: 13px; color: #374151; line-height: 1.45; padding-left: 14px; position: relative; }
  .task-line::before { content: '–'; position: absolute; left: 0; color: #9ca3af; }
  .task-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .cal-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 8px 12px; border-radius: 8px; background: #eff6ff; color: #1d4ed8; text-decoration: none; border: 1px solid #bfdbfe; }
  .done-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 8px 12px; border-radius: 8px; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; cursor: pointer; }
  .done-btn.undo { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

  .who-badge { font-size: 10px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 99px; padding: 2px 8px; margin-left: auto; }

  .empty { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 15px; }

  .fab { position: fixed; bottom: 20px; right: 16px; background: #1a1a2e; color: #fff; border: none; border-radius: 14px; padding: 13px 18px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 200; }

  .name-modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .name-modal { background: #fff; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px; }
  .name-modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .name-modal p { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .name-input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; margin-bottom: 12px; }
  .name-input:focus { border-color: #6366f1; }
  .name-submit { width: 100%; padding: 13px; background: #1a1a2e; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
</style>
</head>

<div class="header">

d radon contractor do not overlap"],"iso":"2026-06-21"},{"date":"Jun 22 (Mon)","cat":"property","deadline":true,"title":"Radon mitigation contractor -- 9:00 AM","lines":["Contractor arrives 9AM at 323 Burnt Mill Lane","Be present for the appointment","If cleaners are also coming June 22, schedule them for afternoon to avoid conflict"],"iso":"2026-06-22"},{"date":"Jun 22 (Mon)","cat":"moving","deadline":true,"title":"Land Rover + cargo trailer arrives -- Mattaponi","lines":["Carrier delivers Land Rover and cargo trailer","Be present -- inspect vehicle and trailer immediately for any damage","Final 1/3 transport payment due today on delivery","Photograph any damage before signing delivery receipt"],"iso":"2026-06-22"},{"date":"Jun 22 (Mon)","cat":"money","deadline":true,"title":"Land Rover + trailer transport -- final 1/3 payment DUE","lines":["Third and final payment due on delivery","Have payment ready before carrier arrives","Get signed delivery receipt"],"iso":"2026-06-22"},{"date":"Jun 22 (Mon)","cat":"movers","deadline":true,"title":"Mattaponi movers -- UNLOAD PackRat container","lines":["2 movers unloading PackRat container only","Schedule for afternoon June 22 if container arrived June 21, or morning if needed","Have a floor plan ready so movers know where furniture goes","Coordinate with radon contractor -- do not overlap with the 9AM appointment","King and Queen County is rural -- confirm movers are still coming day before"],"iso":"2026-06-22"},{"date":"May 28 (Thu)","cat":"property","deadline":false,"title":"Find VA electricity provider for 323 Burnt Mill Lane","lines":["King and Queen County is typically served by Dominion Energy or Rappahannock Electric Cooperative (REC)","To confirm: call King and Queen County offices at (804) 785-5975 OR ask Monica -- she will know","Rappahannock Electric Cooperative: 800-552-3904 | rappahannockelectric.com","Dominion Energy: 866-366-4357 | dominionenergy.com","Find out TODAY -- you need this before you can schedule the ds before June expenses hit","Check Rivermark Credit Union first (existing relationship helps)","Compare: SoFi (sofi.com), LightStream (lightstream.com)","Have ready: last 2 pay stubs, 2 bank statements, employer info, SSN"],"iso":"2026-05-30"},{"date":"Jun 14 (Sun)","cat":"business","deadline":false,"title":"Research VA vehicle registration on the road","lines":["Vehicles to register: Land Cruiser, Land Rover, Motorcycle, Cargo Trailer","VA requires registration within 30 days of establishing residency","Research: dmv.virginia.gov","VA safety inspection required before registration -- done after arrival","DMV Select in King William or West Point is faster than full DMV","Target: all vehicles registered before June 29"],"iso":"2026-06-14"},{"date":"Jun 21 (Sun)","cat":"business","deadline":true,"title":"Change Google My Business address to Virginia","lines":["You are physically at 323 Burnt Mill Lane -- safe to update GMB now","Go to business.google.com > Info > Address > update to Mattaponi VA 23110","Google will trigger verification -- postcard or video call","If video: walk around exterior of property on camera","If postcard: watch for Google envelope in mail (5-14 days)"],"iso":"2026-06-21"},{"date":"Jun 22 (Mon)","cat":"business","deadline":false,"title":"VA vehicle registration -- schedule safety inspections","lines":["Call a licensed VA inspection station in King William or West Point area","All 4 vehicles need VA safety inspection before registration","Try to schedule all on same day to minimize trips","Budget $50-150 per vehicle in registration fees","Target completion: before June 29"],"iso":"2026-06-22"},{"date":"May 28 (Thu)","cat":"vehicle","deadline":false,"title":"ORDER: Back seat organizers for kids","lines":["Order seat back organizers for kids in boosters -- hang on front seat backs","Good options: LUSSO Gear or Diono (~$25-40 each, need 2)","Also consider: small soft cooler for snacks accessible from back seat","Order now for Amazon delivery before June 14"],"iso":"2026-05-28"},{"date":"May 28 (Thu)","cat":"vehicle","deadline":false,"title":"ORDER: Spare tire for cargo trailer","lines":["Get trailer tire size from sidewall or owner manual before ordering","Order matching spare + mounting hardware (or buy mounted at a tire shop)","Do not leave Portland without a trailer spare -- Montana and South Dakota are remote"],"iso":"2026-05-28"},{"date":"May 28 (Thu)","cat":"vehicle","deadline":false,"title":"ORDER: SxS cover for Can-Am Maverick on trailer","lines":["Order fitted cover for Can-Am Maverick -- protects from road debris and weather","Search: Can-Am Maverick Sport/Trail cover (confirm your exact trim)","Must have tie-down straps to secure at highway speeds","Allow 5-7 days delivery"],"iso":"2026-05-28"},{"date":"Jun 2 (Tue)","cat":"vehicle","deadline":false,"title":"Schedule Land Cruiser service -- oil change + tire rotation","lines":["2000 Land Cruiser 100 Series -- oil spec: 5W-30 conventional","Stock tire size: 275/70R16 -- 32 PSI cold / 35 PSI towing","Inspect: coolant, brake fluid, transmission fluid, differential fluid, belts and hoses","Check trailer hitch receiver, ball mount, and wiring harness","Book NOW -- must be done before June 14 departure"],"iso":"2026-06-02"},{"date":"Jun 2 (Tue)","cat":"vehicle","deadline":false,"title":"Check booster seats -- comfort and fit","lines":["Confirm fit in Land Cruiser back seat for 8 days on the road","Check: seatbelt path correct, booster not sliding, kids can reach buckle","Do a test sit before departure day","If replacing: Graco Affix or Chicco GoFit (~$40-60)"],"iso":"2026-06-02"},{"date":"Jun 5 (Thu)","cat":"vehicle","deadline":true,"title":"Land Cruiser -- pre-departure inspection complete","lines":["Oil changed, tires rotated and pressure checked","All fluids topped: coolant, brake, transmission, differential","Trailer hitch, ball, and wiring harness inspected","Spare trailer tire on board | SxS cover secured on Can-Am","Back seat organizers installed | Boosters comfortable","Emergency kit: jumper cables, tow strap, first aid, flashlight, tools"],"iso":"2026-06-05"},{"date":"May 28 (Thu)","cat":"home","deadline":false,"title":"ORDER: Oven plastic cover replacement","lines":["Find make and model from label inside oven door frame","Search: [make] [model] control panel cover / fascia replacement","Order from AppliancePartsPros.com or RepairClinic.com","If discontinued: check eBay for used OEM part | Allow 5-10 days"],"iso":"2026-05-28"},{"date":"Jun 9 (Mon)","cat":"home","deadline":false,"title":"ORDER: Kitchen staples for 323 Burnt Mill Lane","lines":["Pantry: cooking oil, salt, pepper, spices, pasta, rice, canned goods, coffee","Cleaning: dish soap, all-purpose cleaner, paper towels, trash bags, sponges","Bathroom: toilet paper (buy a lot -- stores are far), soap, shampoo","Option: schedule Walmart/Amazon delivery to arrive June 22","West Point VA has a Food Lion and Dollar General for immediate needs"],"iso":"2026-06-09"}];

let done = {};
let userName = localStorage.getItem('pdx_va_name') || '';
let activeCat = 'all';
let expandedCards = new Set();
let allExpanded = false;
let isConnected = false;

function saveName() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  userName = val;
  localStorage.setItem('pdx_va_name', val);
  document.getElementById('nameModal').style.display = 'none';
}
window.saveName = saveName;

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveName();
});

if (userName) {
  document.getElementById('nameModal').style.display = 'none';
}

function setSync(state) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  const banner = document.getElementById('syncBanner');
  if (state === 'live') {
    dot.className = 'sync-dot live';
    label.textContent = 'Live sync on';
    banner.classList.remove('show');
    isConnected = true;
  } else if (state === 'syncing') {
    dot.className = 'sync-dot syncing';
    label.textContent = 'Syncing...';
  } else {
    dot.className = 'sync-dot';
    label.textContent = 'Offline';
    banner.classList.add('show');
    isConnected = false;
  }
}

onValue(checklistRef, (snapshot) => {
  setSync('live');
  const data = snapshot.val();
  done = data || {};
  updateProgress();
  render();
}, (error) => {
  setSync('offline');
  console.error('Firebase error:', error);
});

function toggleDone(id) {
  setSync('syncing');
  const name = userName || 'Someone';
  if (done[id]) {
    const newDone = {...done};
    delete newDone[id];
    set(checklistRef, newDone).then(() => setSync('live')).catch(() => setSync('offline'));
  } else {
    const newDone = {...done, [id]: { by: name, at: Date.now() }};
    set(checklistRef, newDone).then(() => setSync('live')).catch(() => setSync('offline'));
  }
}

function gcal(title, iso, lines) {
  const d = iso.replace(/-/g, '');
  const dt = new Date(iso + 'T12:00:00');
  dt.setDate(dt.getDate() + 1);
  const nd = dt.toISOString().slice(0,10).replace(/-/g,'');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${d}/${nd}&details=${encodeURIComponent(lines.join('\n'))}`;
}

function taskId(item, idx) { return 'task_' + idx; }

function updateProgress() {
  const total = ITEMS.length;
  const doneCount = Object.keys(done).length;
  const pct = Math.round(doneCount / total * 100);
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('plabel').textContent = doneCount + ' / ' + total + ' done';
}

function buildChips() {
  const el = document.getElementById('chips');
  const cats = ['all', ...Object.keys(CATS), 'deadlines'];
  el.innerHTML = '';
  cats.forEach(cat => {
    const count = cat === 'all' ? ITEMS.length : cat === 'deadlines' ? ITEMS.filter(i=>i.deadline).length : ITEMS.filter(i=>i.cat===cat).length;
    const b = document.createElement('button');
    b.className = 'chip' + (cat === activeCat ? ' active' : '');
    const label = cat === 'all' ? 'All' : cat === 'deadlines' ? 'Deadlines' : CATS[cat].label;
    b.textContent = label + ' ' + count;
    b.onclick = () => { activeCat = cat; buildChips(); render(); };
    el.appendChild(b);
  });
}

function buildSummary(filtered) {
  const el = document.getElementById('sumbar');
  const doneCount = filtered.filter((item,i) => done[taskId(item, ITEMS.indexOf(item))]).length;
  const dl = filtered.filter(i=>i.deadline).length;
  el.innerHTML = `<span class="stat"><strong>${filtered.length}</strong> tasks</span><span class="stat"><strong>${dl}</strong> deadlines</span><span class="stat"><strong>${filtered.length - doneCount}</strong> remaining</span>`;
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  let filtered = ITEMS.filter((item) => {
    if (activeCat === 'deadlines' && !item.deadline) return false;
    if (activeCat !== 'all' && activeCat !== 'deadlines' && item.cat !== activeCat) return false;
    if (q) return item.title.toLowerCase().includes(q) || item.lines.some(l => l.toLowerCase().includes(q));
    return true;
  });

  buildSummary(filtered);
  const tl = document.getElementById('tl');
  tl.innerHTML = '';

  if (!filtered.length) {
    tl.innerHTML = '<div class="empty">No tasks match.</div>';
    return;
  }

  const grouped = {};
  DATE_ORDER.forEach(d => {
    const di = filtered.filter(item => item.date === d);
    if (di.length) grouped[d] = di;
  });

  Object.entries(grouped).forEach(([date, items]) => {
    const block = document.createElement('div');
    block.className = 'date-block';
    const hdr = document.createElement('div');
    hdr.className = 'date-hdr';
    hdr.innerHTML = `<span class="date-label">${date}</span><div class="date-line"></div><span class="date-count">${items.length}</span>`;
    block.appendChild(hdr);

    items.forEach(item => {
      const globalIdx = ITEMS.indexOf(item);
      const id = taskId(item, globalIdx);
      const doneEntry = done[id];
      const isDone = !!doneEntry;
      const isOpen = expandedCards.has(id);
      const cat = CATS[item.cat] || CATS.home;

      const card = document.createElement('div');
      card.className = 'task-card' + (isDone ? ' done' : '') + (item.deadline ? ' deadline-card' : '');
      card.style.borderLeftColor = cat.c;

      const top = document.createElement('div');
      top.className = 'task-top';
      top.onclick = (e) => {
        if (e.target.closest('.checkbox')) return;
        if (expandedCards.has(id)) expandedCards.delete(id);
        else expandedCards.add(id);
        render();
      };

      const cb = document.createElement('div');
      cb.className = 'checkbox' + (isDone ? ' checked' : '');
      cb.innerHTML = `<svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      cb.onclick = (e) => { e.stopPropagation(); toggleDone(id); };

      const meta = document.createElement('div');
      meta.className = 'task-meta';

      const title = document.createElement('div');
      title.className = 'task-title';
      title.textContent = item.title;

      const badges = document.createElement('div');
      badges.className = 'task-badges';

      const catPill = document.createElement('span');
      catPill.className = 'badge';
      catPill.style.cssText = `background:${cat.bg};color:${cat.tc}`;
      catPill.textContent = cat.label;
      badges.appendChild(catPill);

      if (item.deadline) {
        const dp = document.createElement('span');
        dp.className = 'badge deadline-pill';
        dp.textContent = 'Hard deadline';
        badges.appendChild(dp);
      }

      if (isDone && doneEntry.by) {
        const who = document.createElement('span');
        who.className = 'badge';
        who.style.cssText = 'background:#f3f4f6;color:#6b7280;margin-left:2px';
        who.textContent = '✓ ' + doneEntry.by;
        badges.appendChild(who);
      }

      meta.appendChild(title);
      meta.appendChild(badges);

      const chev = document.createElement('div');
      chev.className = 'chevron-btn' + (isOpen ? ' open' : '');
      chev.textContent = '⌄';

      top.appendChild(cb);
      top.appendChild(meta);
      top.appendChild(chev);

      const body = document.createElement('div');
      body.className = 'task-body' + (isOpen ? ' open' : '');

      const linesDiv = document.createElement('div');
      linesDiv.className = 'task-lines';
      item.lines.forEach(line => {
        const ld = document.createElement('div');
        ld.className = 'task-line';
        ld.textContent = line;
        linesDiv.appendChild(ld);
      });

      const actions = document.createElement('div');
      actions.className = 'task-actions';

      const calA = document.createElement('a');
      calA.className = 'cal-btn';
      calA.href = gcal(item.title, item.iso, item.lines);
      calA.target = '_blank';
      calA.rel = 'noopener';
      calA.textContent = '📅 Add to Google Calendar';
      actions.appendChild(calA);

      const doneBtn = document.createElement('button');
      doneBtn.className = 'done-btn' + (isDone ? ' undo' : '');
      doneBtn.textContent = isDone ? '↩ Mark undone' : '✓ Mark done';
      doneBtn.onclick = () => toggleDone(id);
      actions.appendChild(doneBtn);

      body.appendChild(linesDiv);
      body.appendChild(actions);
      card.appendChild(top);
      card.appendChild(body);
      block.appendChild(card);
    });

    tl.appendChild(block);
  });
}

window.clearDone = function() {
  if (confirm('Reset all checkmarks for everyone?')) {
    set(checklistRef, {}).then(() => { done = {}; updateProgress(); render(); });
  }
};

window.toggleExpand = function() {
  if (allExpanded) {
    expandedCards.clear();
    document.getElementById('fabBtn').textContent = 'Expand all';
    allExpanded = false;
  } else {
    ITEMS.forEach((item, i) => expandedCards.add(taskId(item, i)));
    document.getElementById('fabBtn').textContent = 'Collapse all';
    allExpanded = true;
  }
  render();
};

document.getElementById('srch').addEventListener('input', render);
buildChips();
render();
</script>
