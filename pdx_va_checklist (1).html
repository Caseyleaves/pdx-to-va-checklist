<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>PDX To VA Moving Checklist</title>
<style>
:root{--bg:#f7f8fa;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:#1a1a2e;color:#fff;padding:18px 16px 12px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hdr h1{font-size:16px;font-weight:700;line-height:1.2}
.hdr p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.sync-info{text-align:right;flex-shrink:0}
.sync-row{display:flex;align-items:center;gap:5px;justify-content:flex-end}
.sdot{width:7px;height:7px;border-radius:50%;background:#6b7280;transition:background .3s}
.sdot.live{background:#4ade80}
.sdot.syncing{background:#fbbf24;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.slbl{font-size:10px;color:rgba(255,255,255,.4)}
.uname{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;cursor:pointer}
.prog-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.prog-bar{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#4ade80;border-radius:99px;transition:width .4s}
.prog-lbl{font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap}
.offline-banner{background:#fef3c7;border-bottom:1px solid #fde68a;padding:7px 16px;font-size:12px;color:#92400e;display:none}
.offline-banner.show{display:block}
.controls{padding:10px 16px 6px;display:flex;flex-direction:column;gap:7px}
.search-row{display:flex;gap:7px}
.srch{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:#fff;color:var(--text);outline:none}
.srch:focus{border-color:#6366f1}
.add-btn{padding:9px 14px;border-radius:10px;background:#22c55e;color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.active{border-color:#1a1a2e;background:#1a1a2e;color:#fff}
.sumbar{display:flex;gap:5px;padding:0 16px 6px;flex-wrap:wrap}
.stat{font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--border);border-radius:7px;padding:3px 9px}
.stat strong{color:var(--text)}
.timeline{padding:0 16px 120px}
.dblock{margin-bottom:2px}
.dhdr{display:flex;align-items:center;gap:8px;padding:12px 0 5px}
.dlbl{font-size:12px;font-weight:700}
.dline{flex:1;height:1px;background:var(--border)}
.dcnt{font-size:10px;color:var(--muted);background:var(--border);border-radius:99px;padding:2px 7px}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);border-left:4px solid;margin-bottom:7px;overflow:hidden;transition:opacity .2s}
.card.done{opacity:.5;background:#f0fdf4}
.card.dl-card{box-shadow:0 0 0 1px rgba(220,38,38,.1)}
.card.custom{border-left-style:dashed}
.ctop{display:flex;align-items:flex-start;gap:11px;padding:12px 12px 9px;cursor:pointer;user-select:none}
.cb{width:26px;height:26px;min-width:26px;border-radius:7px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;cursor:pointer;flex-shrink:0}
.cb.checked{background:#22c55e;border-color:#22c55e}
.cb svg{display:none}
.cb.checked svg{display:block}
.cmeta{flex:1;min-width:0}
.ctitle{font-size:14px;font-weight:600;line-height:1.3}
.card.done .ctitle{text-decoration:line-through;color:var(--muted)}
.cbadges{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px}
.dl-pill{background:#fef2f2;color:#dc2626}
.cu-pill{background:#f0fdf4;color:#16a34a}
.who-pill{background:#f3f4f6;color:#6b7280}
.chev{color:var(--muted);font-size:18px;margin-top:2px;transition:transform .2s;flex-shrink:0;line-height:1}
.chev.open{transform:rotate(180deg)}
.cbody{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .25s ease}
.cbody.open{max-height:700px;padding-bottom:12px}
.clines{display:flex;flex-direction:column;gap:4px;border-top:1px solid var(--border);padding-top:9px}
.cline{font-size:13px;color:#374151;line-height:1.4;padding-left:13px;position:relative}
.cline::before{content:"-";position:absolute;left:0;color:#9ca3af}
.cacts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.cal-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:7px 11px;border-radius:8px;background:#eff6ff;color:#1d4ed8;text-decoration:none;border:1px solid #bfdbfe}
.done-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:7px 11px;border-radius:8px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;cursor:pointer}
.done-btn.undo{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:14px}
.fab-group{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:200}
.fab{border:none;border-radius:14px;padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.fab-green{background:#22c55e;color:#fff}
.fab-dark{background:#1a1a2e;color:#fff}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:520px;transform:translateY(100%);transition:transform .25s ease}
.overlay.show .modal{transform:translateY(0)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:18px}
.flabel{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.finput{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:#fff;outline:none;font-family:inherit;margin-bottom:14px}
.finput:focus{border-color:#6366f1}
textarea.finput{min-height:80px;resize:vertical}
.macts{display:flex;gap:10px;margin-top:6px}
.mbtn-cancel{flex:1;padding:13px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--muted);font-size:15px;font-weight:600;cursor:pointer}
.mbtn-save{flex:2;padding:13px;border:none;border-radius:10px;background:#1a1a2e;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.name-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px}
.name-box{background:#fff;border-radius:18px;padding:28px 22px;width:100%;max-width:340px}
.name-box h2{font-size:20px;font-weight:700;margin-bottom:6px}
.name-box p{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.name-input{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;outline:none;margin-bottom:12px;font-family:inherit}
.name-input:focus{border-color:#6366f1}
.name-go{width:100%;padding:14px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="name-overlay" id="nameOverlay">
  <div class="name-box">
    <h2>Who's checking in?</h2>
    <p>Enter your name so you and Eric can see who checked each item off.</p>
    <input class="name-input" id="nameInput" type="text" placeholder="Casey or Eric..." maxlength="20" autocomplete="off">
    <button class="name-go" id="nameGo">Let's go</button>
  </div>
</div>

<div class="overlay" id="addOverlay">
  <div class="modal">
    <h2>Add a task</h2>
    <label class="flabel">Title *</label>
    <input class="finput" id="newTitle" type="text" placeholder="What needs to happen?" maxlength="120" autocomplete="off">
    <label class="flabel">Details (one per line)</label>
    <textarea class="finput" id="newDetails" placeholder="Notes, phone numbers, links..."></textarea>
    <label class="flabel">Date</label>
    <input class="finput" id="newDate" type="date" min="2026-05-21" max="2026-07-31">
    <div class="macts">
      <button class="mbtn-cancel" id="cancelAdd">Cancel</button>
      <button class="mbtn-save" id="saveAdd">Add task</button>
    </div>
  </div>
</div>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1>PDX To VA Moving Checklist</h1>
      <p>Portland OR &rarr; Mattaponi VA &bull; May 28 &ndash; June 22, 2026</p>
    </div>
    <div class="sync-info">
      <div class="sync-row">
        <div class="sdot" id="sdot"></div>
        <span class="slbl" id="slbl">Connecting...</span>
      </div>
      <div class="uname" id="uname" onclick="resetName()"></div>
    </div>
  </div>
  <div class="prog-row">
    <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
    <span class="prog-lbl" id="plbl">Loading...</span>
  </div>
</div>

<div class="offline-banner" id="offlineBanner">Offline -- changes will sync when reconnected</div>

<div class="controls">
  <div class="search-row">
    <input class="srch" id="srch" type="search" placeholder="Search tasks..." autocomplete="off">
    <button class="add-btn" id="openAdd1">+ Add</button>
  </div>
  <div class="chips" id="chips"></div>
</div>
<div class="sumbar" id="sumbar"></div>
<div class="timeline" id="tl"><div class="empty">Connecting...</div></div>

<div class="fab-group">
  <button class="fab fab-green" id="openAdd2">+ Add task</button>
  <button class="fab fab-dark" id="expandBtn">Expand all</button>
</div>

let doneData = {};
let customTasks = {};
let userName = localStorage.getItem("pdx_va_name") || "";
let activeCat = "all";
let expanded = new Set();
let allExp = false;
let loaded = false;

// Name modal
function initName() {
  if (userName) {
    document.getElementById("nameOverlay").style.display = "none";
    document.getElementById("uname").textContent = "Checking in as " + userName;
  }
}
document.getElementById("nameGo").onclick = function() {
  var v = document.getElementById("nameInput").value.trim();
  if (!v) return;
  userName = v;
  localStorage.setItem("pdx_va_name", v);
  document.getElementById("nameOverlay").style.display = "none";
  document.getElementById("uname").textContent = "Checking in as " + v;
};
document.getElementById("nameInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") document.getElementById("nameGo").click();
});
window.resetName = function() {
  localStorage.removeItem("pdx_va_name");
  userName = "";
  document.getElementById("nameInput").value = "";
  document.getElementById("nameOverlay").style.display = "flex";
};
initName();

// Sync status
function setSS(s) {
  var dot = document.getElementById("sdot");
  var lbl = document.getElementById("slbl");
  var ban = document.getElementById("offlineBanner");
  if (s === "live") { dot.className = "sdot live"; lbl.textContent = "Live"; ban.classList.remove("show"); }
  else if (s === "syncing") { dot.className = "sdot syncing"; lbl.textContent = "Saving..."; }
  else { dot.className = "sdot"; lbl.textContent = "Offline"; ban.classList.add("show"); }
}

// Firebase listeners
onValue(doneRef, function(snap) {
  doneData = snap.val() || {};
  setSS("live");
  if (loaded) { updateProg(); render(); }
}, function() { setSS("offline"); });

onValue(customRef, function(snap) {
  customTasks = snap.val() || {};
  loaded = true;
  updateProg();
  buildChips();
  render();
}, function() { setSS("offline"); });

function allItems() {
  var custom = Object.entries(customTasks).map(function(entry) {
    var id = entry[0]; var t = entry[1];
    return { id: id, date: t.date || "Jun 23+", cat: "custom", dl: false,
      title: t.title, lines: t.lines || [], iso: t.iso || "2026-06-23",
      addedBy: t.addedBy, isCustom: true };
  });
  return BUILTIN.map(function(t, i) { return Object.assign({}, t, { id: "b" + i }); }).concat(custom);
}

function isoToLabel(iso) {
  if (!iso) return "Jun 23+";
  var d = new Date(iso + "T12:00:00");
  var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug"];
  var lbl = days[d.getDay()] + " " + months[d.getMonth()] + " " + d.getDate();
  return DATE_ORDER.indexOf(lbl) >= 0 ? lbl : "Jun 23+";
}

function gcal(title, iso, lines) {
  var d = (iso || "2026-06-23").replace(/-/g, "");
  var dt = new Date((iso || "2026-06-23") + "T12:00:00");
  dt.setDate(dt.getDate() + 1);
  var nd = dt.toISOString().slice(0, 10).replace(/-/g, "");
  return "https://calendar.google.com/calendar/render?action=TEMPLATE&text=" +
    encodeURIComponent(title) + "&dates=" + d + "/" + nd +
    "&details=" + encodeURIComponent((lines || []).join("\n"));
}

function updateProg() {
  var items = allItems();
  var total = items.length;
  var dc = items.filter(function(i) { return doneData[i.id]; }).length;
  var pct = total ? Math.round(dc / total * 100) : 0;
  document.getElementById("pfill").style.width = pct + "%";
  document.getElementById("plbl").textContent = dc + " / " + total + " done";
}

function toggleDone(id) {
  setSS("syncing");
  var upd = {};
  if (doneData[id]) {
    upd[id] = null;
    delete doneData[id];
  } else {
    upd[id] = { by: userName || "Someone", at: Date.now() };
    doneData[id] = upd[id];
  }
  update(doneRef, upd).then(function() { setSS("live"); }).catch(function() { setSS("offline"); });
  updateProg();
  render();
}

function buildChips() {
  var items = allItems();
  var el = document.getElementById("chips");
  var cats = ["all"].concat(Object.keys(CATS)).concat(["deadlines"]);
  el.innerHTML = "";
  cats.forEach(function(cat) {
    var count = cat === "all" ? items.length
      : cat === "deadlines" ? items.filter(function(i) { return i.dl; }).length
      : items.filter(function(i) { return i.cat === cat; }).length;
    if (count === 0 && cat !== "all") return;
    var b = document.createElement("button");
    b.className = "chip" + (cat === activeCat ? " active" : "");
    var lbl = cat === "all" ? "All" : cat === "deadlines" ? "Deadlines" : (CATS[cat] ? CATS[cat].label : cat);
    b.textContent = lbl + " " + count;
    b.onclick = function() { activeCat = cat; buildChips(); render(); };
    el.appendChild(b);
  });
}

function render() {
  var q = document.getElementById("srch").value.toLowerCase();
  var items = allItems();
  var f = items.filter(function(item) {
    if (activeCat === "deadlines" && !item.dl) return false;
    if (activeCat !== "all" && activeCat !== "deadlines" && item.cat !== activeCat) return false;
    if (q) return item.title.toLowerCase().indexOf(q) >= 0 ||
      (item.lines || []).some(function(l) { return l.toLowerCase().indexOf(q) >= 0; });
    return true;
  });

  var dc = f.filter(function(i) { return doneData[i.id]; }).length;
  var dl = f.filter(function(i) { return i.dl; }).length;
  document.getElementById("sumbar").innerHTML =
    "<span class='stat'><strong>" + f.length + "</strong> tasks</span>" +
    "<span class='stat'><strong>" + dl + "</strong> deadlines</span>" +
    "<span class='stat'><strong>" + (f.length - dc) + "</strong> remaining</span>";

  var tl = document.getElementById("tl");
  tl.innerHTML = "";
  if (!f.length) { tl.innerHTML = "<div class='empty'>No tasks match.</div>"; return; }

  var grouped = {};
  DATE_ORDER.forEach(function(d) {
    var di = f.filter(function(i) {
      return i.date === d || (d === "Jun 23+" && DATE_ORDER.slice(0, -1).indexOf(i.date) < 0);
    });
    if (di.length) grouped[d] = di;
  });

  Object.keys(grouped).forEach(function(date) {
    var items = grouped[date];
    var block = document.createElement("div");
    block.className = "dblock";
    var hdr = document.createElement("div");
    hdr.className = "dhdr";
    hdr.innerHTML = "<span class='dlbl'>" + date + "</span><div class='dline'></div><span class='dcnt'>" + items.length + "</span>";
    block.appendChild(hdr);

    items.forEach(function(item) {
      var id = item.id;
      var de = doneData[id];
      var isDone = !!de;
      var isOpen = expanded.has(id);
      var cat = CATS[item.cat] || CATS.custom;

      var card = document.createElement("div");
      card.className = "card" + (isDone ? " done" : "") + (item.dl ? " dl-card" : "") + (item.isCustom ? " custom" : "");
      card.style.borderLeftColor = cat.c;

      var top = document.createElement("div");
      top.className = "ctop";
      top.onclick = function(e) {
        if (e.target.closest(".cb")) return;
        if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
        render();
      };

      var cb = document.createElement("div");
      cb.className = "cb" + (isDone ? " checked" : "");
      cb.innerHTML = "<svg width='13' height='10' viewBox='0 0 13 10' fill='none'><path d='M1.5 5L5 8.5L11.5 1.5' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/></svg>";
      cb.onclick = function(e) { e.stopPropagation(); toggleDone(id); };

      var meta = document.createElement("div");
      meta.className = "cmeta";
      var tt = document.createElement("div");
      tt.className = "ctitle";
      tt.textContent = item.title;

      var badges = document.createElement("div");
      badges.className = "cbadges";

      var cp = document.createElement("span");
      cp.className = "badge";
      cp.style.cssText = "background:" + cat.bg + ";color:" + cat.tc;
      cp.textContent = cat.label;
      badges.appendChild(cp);

      if (item.dl) {
        var dp = document.createElement("span");
        dp.className = "badge dl-pill";
        dp.textContent = "Hard deadline";
        badges.appendChild(dp);
      }
      if (item.isCustom) {
        var xp = document.createElement("span");
        xp.className = "badge cu-pill";
        xp.textContent = "Added by " + (item.addedBy || "us");
        badges.appendChild(xp);
      }
      if (isDone && de.by) {
        var wp = document.createElement("span");
        wp.className = "badge who-pill";
        wp.textContent = "Done by " + de.by;
        badges.appendChild(wp);
      }

      meta.appendChild(tt);
      meta.appendChild(badges);

      var chev = document.createElement("div");
      chev.className = "chev" + (isOpen ? " open" : "");
      chev.textContent = "v";

      top.appendChild(cb);
      top.appendChild(meta);
      top.appendChild(chev);

      var body = document.createElement("div");
      body.className = "cbody" + (isOpen ? " open" : "");

      var ld = document.createElement("div");
      ld.className = "clines";
      (item.lines || []).forEach(function(line) {
        var l = document.createElement("div");
        l.className = "cline";
        l.textContent = line;
        ld.appendChild(l);
      });

      var acts = document.createElement("div");
      acts.className = "cacts";

      var ca = document.createElement("a");
      ca.className = "cal-btn";
      ca.href = gcal(item.title, item.iso, item.lines);
      ca.target = "_blank";
      ca.rel = "noopener";
      ca.textContent = "Add to Google Calendar";
      acts.appendChild(ca);

      var db2 = document.createElement("button");
      db2.className = "done-btn" + (isDone ? " undo" : "");
      db2.textContent = isDone ? "Undo" : "Mark done";
      db2.onclick = function() { toggleDone(id); };
      acts.appendChild(db2);

      body.appendChild(ld);
      body.appendChild(acts);
      card.appendChild(top);
      card.appendChild(body);
      block.appendChild(card);
    });
    tl.appendChild(block);
  });
}

// Add task modal
function openAdd() {
  document.getElementById("addOverlay").classList.add("show");
  document.getElementById("newTitle").focus();
}
function closeAdd() {
  document.getElementById("addOverlay").classList.remove("show");
  document.getElementById("newTitle").value = "";
  document.getElementById("newDetails").value = "";
  document.getElementById("newDate").value = "";
}

document.getElementById("openAdd1").onclick = openAdd;
document.getElementById("openAdd2").onclick = openAdd;
document.getElementById("cancelAdd").onclick = closeAdd;
document.getElementById("addOverlay").onclick = function(e) {
  if (e.target === document.getElementById("addOverlay")) closeAdd();
};

document.getElementById("saveAdd").onclick = function() {
  var title = document.getElementById("newTitle").value.trim();
  if (!title) { document.getElementById("newTitle").focus(); return; }
  var raw = document.getElementById("newDetails").value.trim();
  var lines = raw ? raw.split("\n").map(function(l) { return l.trim(); }).filter(Boolean) : [];
  var dateVal = document.getElementById("newDate").value;
  var iso = dateVal || "2026-06-23";
  var dateLabel = isoToLabel(iso);
  var task = { title: title, lines: lines, date: dateLabel, iso: iso,
    addedBy: userName || "Someone", createdAt: Date.now() };
  setSS("syncing");
  push(customRef, task).then(function() { setSS("live"); closeAdd(); }).catch(function() { setSS("offline"); });
};

// Expand/collapse
document.getElementById("expandBtn").onclick = function() {
  if (allExp) {
    expanded.clear();
    document.getElementById("expandBtn").textContent = "Expand all";
    allExp = false;
  } else {
    allItems().forEach(function(i) { expanded.add(i.id); });
    document.getElementById("expandBtn").textContent = "Collapse all";
    allExp = true;
  }
  render();
};

document.getElementById("srch").addEventListener("input", render);
</script>
