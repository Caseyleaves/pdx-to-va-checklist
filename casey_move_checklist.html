<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;

    --muted: #6b7280;
    --border: #e5e7eb;
    --radius: 12px;
    --done-bg: #f0fdf4;
    --done-text: #15803d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: #1a1a2e; color: #fff; padding: 20px 16px 14px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.15); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4ade80; border-radius: 99px; transition: width .3s ease; }
  .progress-label { font-size: 12px; color: rgba(255,255,255,0.7); white-space: nowrap; }

  .controls { padding: 12px 16px 8px; display: flex; flex-direction: column; gap: 8px; }
  .search-row { display: flex; gap: 8px; }
  .search-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--card); color: var(--text); outline: none; }
  .search-input:focus { border-color: #6366f1; }
  .clear-btn { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--card); color: var(--muted); font-size: 13px; cursor: pointer; white-space: nowrap; }

  .filter-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; -ms-overflow-style: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .chip { padding: 6px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .15s; }
  .chip.active { border-color: #1a1a2e; background: #1a1a2e; color: #fff; }

  .summary-bar { display: flex; gap: 6px; padding: 0 16px 8px; flex-wrap: wrap; }
  .stat { font-size: 11px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; }
  .stat strong { color: var(--text); }

  .timeline { padding: 0 16px 80px; }

  .date-block { margin-bottom: 4px; }
  .date-hdr { display: flex; align-items: center; gap: 8px; padding: 14px 0 6px; }
  .date-label { font-size: 13px; font-weight: 700; color: var(--text); }
  .date-line { flex: 1; height: 1px; background: var(--border); }
  .date-count { font-size: 11px; color: var(--muted); background: var(--border); border-radius: 99px; padding: 2px 8px; }

  .task-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); border-left: 4px solid; margin-bottom: 8px; overflow: hidden; transition: opacity .2s; }
  .task-card.done { opacity: 0.55; background: var(--done-bg); }
  .task-card.deadline-card { box-shadow: 0 0 0 1px rgba(220,38,38,0.12); }

  .task-top { display: flex; align-items: flex-start; gap: 12px; padding: 13px 13px 10px; cursor: pointer; }
  .checkbox { width: 24px; height: 24px; min-width: 24px; border-radius: 7px; border: 2px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all .15s; cursor: pointer; }
  .checkbox.checked { background: #22c55e; border-color: #22c55e; }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }
  .task-meta { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--muted); }
  .task-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
  .deadline-pill { background: #fef2f2; color: #dc2626; }
  .cat-pill { }
  .chevron-btn { color: var(--muted); font-size: 20px; margin-top: 2px; transition: transform .2s; flex-shrink: 0; }
  .chevron-btn.open { transform: rotate(180deg); }

  .task-body { padding: 0 13px; max-height: 0; overflow: hidden; transition: max-height .25s ease, padding .25s; }
  .task-body.open { max-height: 600px; padding-bottom: 12px; }
  .task-lines { display: flex; flex-direction: column; gap: 5px; border-top: 1px solid var(--border); padding-top: 10px; }
  .task-line { font-size: 13px; color: #374151; line-height: 1.45; padding-left: 14px; position: relative; }
  .task-line::before { content: '–'; position: absolute; left: 0; color: #9ca3af; }
  .task-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .cal-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 7px 12px; border-radius: 8px; background: #eff6ff; color: #1d4ed8; text-decoration: none; border: 1px solid #bfdbfe; }
  .done-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 7px 12px; border-radius: 8px; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; cursor: pointer; }

  .empty { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 15px; }

  .fab { position: fixed; bottom: 20px; right: 16px; background: #1a1a2e; color: #fff; border: none; border-radius: 14px; padding: 12px 18px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 200; }
</style>

:"2026-05-28"},{"date":"May 28 (Thu)","cat":"business","deadline":true,"title":"Google My Business -- plan the Virginia address change timing","lines":["DO NOT change the GMB address to Virginia yet -- you are not physically there","Google may require postcard (5-14 days) OR video verification to the new address","PLAN: Change GMB address on or after June 21 when physically at 323 Burnt Mill Lane","Before June 21: update website, social, and all online directories to VA address","Start the GMB change process June 21 -- be ready for postcard or video call","Contact: business.google.com/support"],"iso":"2026-05-28"},{"date":"May 29 (Fri)","cat":"business","deadline":true,"title":"Virginia LLC registration -- file with State Corporation Commission","lines":["File online at: scc.virginia.gov (Clerk's Information System -- CIS)","Virginia LLC filing fee: $100 (online filing)","You will need: LLC name, registered agent VA address, principal office address (323 Burnt Mill Lane, Mattaponi VA 23110)","Processing time: typically 1-3 business days online","After filing: save your Certificate of Organization","Then apply for VA business license: King and Queen County Commissioner of Revenue (804) 785-5978"],"iso":"2026-05-29"},{"date":"May 29 (Fri)","cat":"business","deadline":false,"title":"Virginia business license -- King and Queen County","lines":["After VA LLC is approved, apply for local business license","King and Queen County Commissioner of Revenue: (804) 785-5978","Business license fee: typically $30-100 for new businesses","Ask about BPOL (Business, Professional and Occupational License) requirements"],"iso":"2026-05-29"},{"date":"May 29 (Fri)","cat":"business","deadline":true,"title":"Oregon LLC -- begin dissolution process","lines":["File Articles of Dissolution with Oregon Secretary of State","Oregon SOS online filing: sos.oregon.gov/business | Fee: $100","Before dissolving: pay any outstanding Oregon taxes, notify Oregon Dept of Revenue of closure","Do NOT dissolve Oregon entity until Virginia LLC is confirmed active -- avoid a gap","Timing: file dissolution after you receive Virginia Certificate of Organization"],"iso":"2026-05-29"},{"date":"May 29 (Fri)","cat":"home","deadline":false,"title":"Follow up with Starlink -- Mini dish pending delivery","lines":["Call or chat Starlink support: starlink.com/support or app","If no ETA: escalate and request expedited shipping -- King and Queen County has very limited internet options","If Starlink is delayed past June 21: ask about pickup at a service center","Also confirm your Starlink service plan transfers addresses -- update service address to Mattaponi VA in the app"],"iso":"2026-05-29"},{"date":"May 29 (Fri)","cat":"home","deadline":false,"title":"ORDER: WiFi router + long ethernet cables","lines":["Pack the router in the Land Cruiser, NOT the container","Order ethernet cables for same-day/next-day Amazon delivery: get 50ft and 25ft runs","Recommended: Cat6 flat cable (easier to run along walls/under doors)","Also order: cable clips or flat cable tape to route neatly on Day 1","Goal: functional internet Day 1 (June 21) using Starlink dish + your router"],"iso":"2026-05-29"},{"date":"May 30 (Sat)","cat":"home","deadline":true,"title":"Personal loan -- apply immediately after close","lines":["Apply first thing after closing May 28 -- you need funds before June expenses hit","Check Rivermark Credit Union first -- existing relationship helps approval odds and rate","Compare: SoFi (sofi.com), LightStream (lightstream.com), Marcus by Goldman Sachs","Typical personal loan approval: 1-5 business days for funding","Have ready: last 2 pay stubs, last 2 bank statements, employer info, SSN, new VA address"],"iso":"2026-05-30"},{"date":"Jun 14 (Sun)","cat":"business","deadline":false,"title":"Research VA vehicle registration on the road -- all 4 vehicles","lines":["Vehicles to register in VA: Land Cruiser, Land Rover, Motorcycle, and Cargo Trailer","VA requires registration within 30 days e trailer tire size from the trailer sidewall or owner manual before ordering","Order a matching spare + mounting hardware if the trailer has no spare mount","Alternatively: buy at a local tire shop so it is already mounted","Do not leave Portland without a trailer spare -- you are crossing Montana and South Dakota"],"iso":"2026-05-28"},{"date":"May 28 (Thu)","cat":"vehicle","deadline":false,"title":"ORDER: SxS cover for Can-Am Maverick on trailer","lines":["Order a fitted cover for the Can-Am Maverick -- protects from road debris and weather","Search: Can-Am Maverick Sport/Trail cover (confirm your exact model trim)","Make sure it has tie-down straps to secure in wind at highway speeds","Order immediately -- allow 5-7 days for delivery"],"iso":"2026-05-28"},{"date":"Jun 2 (Tue)","cat":"vehicle","deadline":false,"title":"Schedule Land Cruiser service -- oil change + tire rotation","lines":["2000 Land Cruiser 100 Series -- oil spec: 5W-30 conventional (or 10W-30 acceptable)","Stock tire size: 275/70R16 -- rotate front to rear, 32 PSI cold / 35 PSI towing","Also inspect: coolant, brake fluid, transmission fluid, differential fluid, belts and hoses","Check trailer hitch receiver, ball mount, and wiring harness","Must be done before June 14 departure -- book appointment NOW"],"iso":"2026-06-02"},{"date":"Jun 2 (Tue)","cat":"vehicle","deadline":false,"title":"Check booster seats -- comfort and fit","lines":["Confirm fit is solid in the Land Cruiser back seat for 8 days on the road","Check: seatbelt path is correct, booster is not sliding, kids can reach buckle easily","Do a test sit with kids before departure day","If seats need replacing: Graco Affix or Chicco GoFit (~$40-60, firm back support for long trips)"],"iso":"2026-06-02"},{"date":"Jun 5 (Thu)","cat":"vehicle","deadline":true,"title":"Land Cruiser -- pre-departure inspection complete","lines":["Oil changed, tires rotated and pressure checked","All fluids topped: coolant, brake, transmission, differential","Trailer hitch, ball, and wiring harness inspected and functional","Spare trailer tire on board | SxS cover installed and secured on Can-Am","Back seat organizers installed, boosters confirmed comfortable","Emergency kit in car: jumper cables, tow strap, first aid kit, flashlight, basic tools"],"iso":"2026-06-05"},{"date":"May 28 (Thu)","cat":"home","deadline":false,"title":"ORDER: Oven plastic cover replacement","lines":["Find the make and model of your oven (label inside door frame or back of unit)","Search: [make] [model] control panel cover / fascia replacement","Order from AppliancePartsPros.com, RepairClinic.com, or manufacturer parts site","If discontinued: check eBay for used OEM part | Allow 5-10 days shipping"],"iso":"2026-05-28"},{"date":"Jun 9 (Mon)","cat":"home","deadline":false,"title":"ORDER: Kitchen staples for 323 Burnt Mill Lane","lines":["Order ahead so supplies arrive around June 21 -- or pick up in West Point/Richmond on arrival","Pantry: cooking oil, salt, pepper, spices, pasta, rice, canned goods, coffee","Cleaning: dish soap, all-purpose cleaner, paper towels, trash bags, sponges","Bathroom: toilet paper (buy a lot -- rural, stores are far), soap, shampoo","Option: schedule a Walmart/Amazon delivery to arrive June 22","West Point VA has a Food Lion and Dollar General for immediate needs"],"iso":"2026-06-09"}];

const STORAGE_KEY = 'casey_move_done_v2';
let done = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let activeCat = 'all';
let expandedCards = new Set();
let allExpanded = false;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...done])); }

function gcal(title, iso, lines) {
  const d = iso.replace(/-/g,'');
  const dt = new Date(iso + 'T12:00:00');
  dt.setDate(dt.getDate() + 1);
  const nd = dt.toISOString().slice(0,10).replace(/-/g,'');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${d}/${nd}&details=${encodeURIComponent(lines.join('\n'))}`;
}

function taskId(item, idx) { return item.date + '_' + idx; }

function updateProgress() {
  const total = ITEMS.length;
  const doneCount = [...done].filter(id => ITEMS.some((item,i) => taskId(item,i) === id)).length;
  const pct = Math.round(doneCount / total * 100);
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('plabel').textContent = doneCount + ' / ' + total + ' done';
}

function buildChips() {
  const el = document.getElementById('chips');
  const cats = ['all', ...Object.keys(CATS), 'deadlines'];
  el.innerHTML = '';
  cats.forEach(cat => {
    const count = cat === 'all' ? ITEMS.length : cat === 'deadlines' ? ITEMS.filter(i=>i.deadline).length : ITEMS.filter(i=>i.cat===cat).length;
    const b = document.createElement('button');
    b.className = 'chip' + (cat === activeCat ? ' active' : '');
    const label = cat === 'all' ? 'All' : cat === 'deadlines' ? 'Deadlines' : CATS[cat].label;
    b.textContent = label + ' ' + count;
    b.onclick = () => { activeCat = cat; buildChips(); render(); };
    el.appendChild(b);
  });
}

function buildSummary(filtered) {
  const el = document.getElementById('sumbar');
  const doneCount = filtered.filter((_,i) => done.has(taskId(filtered[i], ITEMS.indexOf(filtered[i])))).length;
  const dl = filtered.filter(i=>i.deadline).length;
  el.innerHTML = `<span class="stat"><strong>${filtered.length}</strong> tasks</span><span class="stat"><strong>${dl}</strong> deadlines</span><span class="stat"><strong>${filtered.length - doneCount}</strong> remaining</span>`;
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  let filtered = ITEMS.filter((item, i) => {
    if (activeCat === 'deadlines' && !item.deadline) return false;
    if (activeCat !== 'all' && activeCat !== 'deadlines' && item.cat !== activeCat) return false;
    if (q) return item.title.toLowerCase().includes(q) || item.lines.some(l => l.toLowerCase().includes(q));
    return true;
  });

  buildSummary(filtered);
  const tl = document.getElementById('tl');
  tl.innerHTML = '';

  if (!filtered.length) {
    tl.innerHTML = '<div class="empty">No tasks match.</div>';
    return;
  }

  const grouped = {};
  DATE_ORDER.forEach(d => {
    const di = filtered.filter(item => item.date === d);
    if (di.length) grouped[d] = di;
  });

  Object.entries(grouped).forEach(([date, items]) => {
    const block = document.createElement('div');
    block.className = 'date-block';
    block.innerHTML = `<div class="date-hdr"><span class="date-label">${date}</span><div class="date-line"></div><span class="date-count">${items.length}</span></div>`;

    items.forEach(item => {
      const globalIdx = ITEMS.indexOf(item);
      const id = taskId(item, globalIdx);
      const isDone = done.has(id);
      const isOpen = expandedCards.has(id);
      const cat = CATS[item.cat] || CATS.home;

      const card = document.createElement('div');
      card.className = 'task-card' + (isDone ? ' done' : '') + (item.deadline ? ' deadline-card' : '');
      card.style.borderLeftColor = cat.c;

      const top = document.createElement('div');
      top.className = 'task-top';
      top.onclick = (e) => {
        if (e.target.closest('.checkbox')) return;
        if (expandedCards.has(id)) expandedCards.delete(id);
        else expandedCards.add(id);
        render();
      };

      const cb = document.createElement('div');
      cb.className = 'checkbox' + (isDone ? ' checked' : '');
      cb.innerHTML = `<svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      cb.onclick = (e) => {
        e.stopPropagation();
        if (done.has(id)) done.delete(id); else done.add(id);
        save(); updateProgress(); render();
      };

      const meta = document.createElement('div');
      meta.className = 'task-meta';
      const title = document.createElement('div');
      title.className = 'task-title';
      title.textContent = item.title;

      const badges = document.createElement('div');
      badges.className = 'task-badges';
      const catPill = document.createElement('span');
      catPill.className = 'badge cat-pill';
      catPill.style.cssText = `background:${cat.bg};color:${cat.tc}`;
      catPill.textContent = cat.label;
      badges.appendChild(catPill);
      if (item.deadline) {
        const dp = document.createElement('span');
        dp.className = 'badge deadline-pill';
        dp.textContent = 'Hard deadline';
        badges.appendChild(dp);
      }

      meta.appendChild(title);
      meta.appendChild(badges);

      const chev = document.createElement('div');
      chev.className = 'chevron-btn' + (isOpen ? ' open' : '');
      chev.textContent = '⌄';

      top.appendChild(cb);
      top.appendChild(meta);
      top.appendChild(chev);

      const body = document.createElement('div');
      body.className = 'task-body' + (isOpen ? ' open' : '');

      const linesDiv = document.createElement('div');
      linesDiv.className = 'task-lines';
      item.lines.forEach(line => {
        const ld = document.createElement('div');
        ld.className = 'task-line';
        ld.textContent = line;
        linesDiv.appendChild(ld);
      });

      const actions = document.createElement('div');
      actions.className = 'task-actions';

      const calA = document.createElement('a');
      calA.className = 'cal-btn';
      calA.href = gcal(item.title, item.iso, item.lines);
      calA.target = '_blank';
      calA.rel = 'noopener';
      calA.innerHTML = '&#128197; Add to Google Calendar';
      actions.appendChild(calA);

      const doneBtn = document.createElement('button');
      doneBtn.className = 'done-btn';
      doneBtn.textContent = isDone ? '↩ Mark undone' : '✓ Mark done';
      doneBtn.onclick = () => {
        if (done.has(id)) done.delete(id); else done.add(id);
        save(); updateProgress(); render();
      };
      actions.appendChild(doneBtn);

      body.appendChild(linesDiv);
      body.appendChild(actions);
      card.appendChild(top);
      card.appendChild(body);
      block.appendChild(card);
    });

    tl.appendChild(block);
  });
}

function clearDone() {
  if (confirm('Clear all checkmarks and start fresh?')) {
    done.clear(); save(); updateProgress(); render();
  }
}

function expandAll() {
  if (allExpanded) {
    expandedCards.clear();
    document.querySelector('.fab').textContent = 'Expand all';
    allExpanded = false;
  } else {
    ITEMS.forEach((item, i) => expandedCards.add(taskId(item, i)));
    document.querySelector('.fab').textContent = 'Collapse all';
    allExpanded = true;
  }
  render();
}

document.getElementById('srch').addEventListener('input', render);
buildChips();
render();
updateProgress();
</script>
